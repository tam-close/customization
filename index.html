<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customization Recommendations — Close CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --white:#ffffff;
  --navy:#1a2332;
  --blue:#1f6feb;
  --blue-light:#e8f0fe;
  --green:#27a85e;
  --green-light:#e6f4ec;
  --amber:#f59e0b;
  --amber-light:#fef3c7;
  --red:#dc2626;
  --red-light:#fee2e2;
  --purple:#7c3aed;
  --purple-light:#ede9fe;
  --teal:#0891b2;
  --teal-light:#e0f2fe;
  --gray:#6b7280;
  --border:#e3e7ed;
  --text:#1a2332;
  --muted:#6b7a99;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.topnav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 24px;gap:12px}
.topnav-logo{display:flex;align-items:center;gap:8px;color:white;font-size:15px;font-weight:600}
.logo-mark{width:26px;height:26px;background:#34c171;border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px;fill:white}
.topnav-sep{width:1px;height:18px;background:rgba(255,255,255,0.2)}
.topnav-sub{font-size:13px;color:rgba(255,255,255,0.6)}
.topnav-badge{margin-left:auto;font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;background:rgba(52,193,113,0.2);color:#34c171;border:1px solid rgba(52,193,113,0.3)}
.page{max-width:900px;margin:0 auto;padding:32px 20px}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.form-card-head{padding:16px 20px;border-bottom:1px solid var(--border);background:#fafbfc}
.form-card-title{font-size:14px;font-weight:600;color:var(--text)}
.form-card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.form-card-body{padding:20px}
.form-field{margin-bottom:18px}
.form-field:last-child{margin-bottom:0}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.form-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--muted);background:var(--white);transition:all 0.15s;user-select:none;font-family:var(--font)}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.selected{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
input[type=text]{width:100%;padding:9px 12px;font-size:13px;font-family:var(--font);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color 0.15s;background:var(--white)}
input[type=text]:focus{border-color:var(--blue)}
input[type=text]::placeholder{color:#aab0c0}
textarea{width:100%;padding:10px 12px;font-size:13px;font-family:var(--font);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);resize:vertical;line-height:1.6;outline:none;transition:border-color 0.15s;background:var(--white);min-height:72px}
textarea:focus{border-color:var(--blue)}
textarea::placeholder{color:#aab0c0}
.btn-row{display:flex;justify-content:flex-end;margin-top:20px}
.btn{padding:8px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);font-family:var(--font);transition:all 0.1s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--blue);color:white;border-color:var(--blue)}
.btn-primary:hover{background:#1a5fd4}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.loading-wrap{text-align:center;padding:48px 20px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--muted)}
.loading-sub{font-size:12px;color:var(--muted);margin-top:4px}
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:600;color:var(--text)}
.page-sub{font-size:14px;color:var(--muted);margin-top:4px;line-height:1.6}
.result-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.section-head{padding:14px 20px;border-bottom:1px solid var(--border);background:#fafbfc;display:flex;align-items:center;gap:8px}
.section-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.section-title{font-size:13px;font-weight:600;color:var(--text)}
.section-sub{font-size:12px;color:var(--muted);margin-top:1px}
.section-body{padding:20px}
.rec-item{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.rec-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.rec-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.rec-why{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.mockup-wrap{background:#f5f6f8;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.mockup-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px;border-bottom:1px solid var(--border);background:#eef0f3}
.status-pills-row{display:flex;flex-wrap:wrap;gap:6px;padding:12px}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;background:#f5f6f8;border:1px solid var(--border);color:var(--text)}
.status-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-wrap{display:flex;gap:8px;padding:12px;overflow-x:auto}
.kanban-col{min-width:140px;flex-shrink:0}
.kanban-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:5px 8px;border-radius:4px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kanban-card{background:white;border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:4px}
.kanban-card-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:3px}
.kanban-card-val{font-size:11px;color:var(--muted)}
.kanban-card-avatar{width:16px;height:16px;border-radius:50%;background:#1a8c5b;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:white;margin-top:4px}
.smartview-wrap{padding:10px 12px}
.smartview-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:4px;font-size:12px;color:var(--text);margin-bottom:2px}
.smartview-item.active{background:var(--blue-light);color:var(--blue)}
.smartview-icon{width:14px;height:14px;flex-shrink:0;opacity:0.5}
.smartview-filter-wrap{padding:10px 12px;border-top:1px solid var(--border)}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;background:#e8f0fe;color:var(--blue);border:1px solid #c5d8fc;margin-right:4px;margin-bottom:4px}
.lead-record-mockup{display:flex;gap:0}
.lead-record-main{flex:1;padding:12px;border-right:1px solid var(--border)}
.lead-record-side{width:180px;padding:12px;flex-shrink:0}
.lead-record-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.field-row{margin-bottom:8px}
.field-row-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px}
.field-row-empty{font-size:12px;color:#aab0c0;font-style:italic}
.workflow-prompt-box{margin:12px;background:white;border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:12px;color:var(--text);line-height:1.6}
.instructions{background:#fafbfc;border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.instructions-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.instructions-label svg{width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:2}
.instruction-steps{list-style:none}
.instruction-step{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.5}
.instruction-step:last-child{margin-bottom:0}
.step-num{width:18px;height:18px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.step-path{font-family:monospace;font-size:11px;background:#e8f0fe;color:var(--blue);padding:1px 5px;border-radius:3px;white-space:nowrap}
.quick-win{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.quick-win:last-child{border-bottom:none}
.qw-num{width:24px;height:24px;border-radius:50%;background:var(--navy);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.qw-text{font-size:13px;color:var(--text);line-height:1.6}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:6px}
.tag-text{background:#f0f4f8;color:var(--muted)}
.tag-dropdown{background:var(--blue-light);color:var(--blue)}
.tag-number{background:var(--green-light);color:var(--green)}
.tag-date{background:var(--amber-light);color:#92640a}
.tag-checkbox{background:var(--purple-light);color:var(--purple)}
.cta-row{display:flex;gap:8px;margin-top:24px;padding-top:24px;border-top:1px solid var(--border)}
.error-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;color:var(--red);font-size:13px}
</style>
</head>
<body>

<div class="topnav">
  <div class="topnav-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    Close
  </div>
  <div class="topnav-sep"></div>
  <span class="topnav-sub">CRM Setup Recommendations</span>
  <span class="topnav-badge">AI-powered</span>
</div>

<div class="page">
  <div id="app"></div>
</div>

<script>
const STATUS_COLORS=[
  {name:'gray',dot:'#9ca3af',bg:'#f3f4f6',border:'#d1d5db'},
  {name:'blue',dot:'#3b82f6',bg:'#eff6ff',border:'#bfdbfe'},
  {name:'green',dot:'#22c55e',bg:'#f0fdf4',border:'#bbf7d0'},
  {name:'yellow',dot:'#eab308',bg:'#fefce8',border:'#fef08a'},
  {name:'orange',dot:'#f97316',bg:'#fff7ed',border:'#fed7aa'},
  {name:'red',dot:'#ef4444',bg:'#fef2f2',border:'#fecaca'},
  {name:'purple',dot:'#8b5cf6',bg:'#f5f3ff',border:'#ddd6fe'},
  {name:'teal',dot:'#14b8a6',bg:'#f0fdfa',border:'#99f6e4'},
];
const PIPELINE_COLORS=[
  {bg:'#FEF3C7',color:'#92400E'},
  {bg:'#DBEAFE',color:'#1E40AF'},
  {bg:'#D1FAE5',color:'#065F46'},
  {bg:'#EDE9FE',color:'#5B21B6'},
  {bg:'#FCE7F3',color:'#9D174D'},
  {bg:'#E0F2FE',color:'#0C4A6E'},
];

let answers={url:'',team:'',leads:[],process:'',tracking:'',challenge:'',extra:''};
let result=null,loading=false;

function canGenerate(){
  return answers.url.trim().length>3 &&
    answers.team &&
    answers.process.trim().length>10 &&
    answers.tracking.trim().length>5 &&
    answers.challenge.trim().length>10;
}

function render(){
  const app=document.getElementById('app');
  if(loading){
    app.innerHTML=`
      <div class="page-header"><div class="page-title">Building your setup...</div><div class="page-sub">Analyzing your business and generating personalized recommendations</div></div>
      <div class="form-card"><div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Personalizing Close for your business...</div><div class="loading-sub">This takes about 15 seconds</div></div></div>`;
    return;
  }
  if(result){renderResult(app);return;}
  renderForm(app);
}

function renderForm(app){
  const ready=canGenerate();
  app.innerHTML=`
    <div class="page-header">
      <div class="page-title">Customization Recommendations</div>
      <div class="page-sub">Tell us about your business and we'll build your perfect Close CRM setup — complete with mockups and step-by-step instructions.</div>
    </div>

    <div class="form-card">
      <div class="form-card-head">
        <div class="form-card-title">About your business</div>
        <div class="form-card-sub">6 quick questions — takes about 2 minutes</div>
      </div>
      <div class="form-card-body">

        <div class="form-field">
          <label class="form-label">Company website</label>
          <input type="text" id="f-url" placeholder="yourcompany.com" value="${answers.url}" oninput="answers.url=this.value;updateBtn()"/>
          <div class="form-hint">We'll use this to understand your business, product, and customer type automatically.</div>
        </div>

        <div class="form-field">
          <label class="form-label">Team size</label>
          <div class="chips">
            ${['Just me','2–5 people','6–15 people','16+ people'].map(o=>`<button class="chip ${answers.team===o?'selected':''}" onclick="answers.team='${o}';render()">${o}</button>`).join('')}
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">How do you find customers? <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted)">(select all that apply)</span></label>
          <div class="chips">
            ${['Outbound cold outreach','Inbound / marketing','Referrals','Events / conferences','Partnerships','Social / content'].map(o=>`<button class="chip ${(answers.leads||[]).includes(o)?'selected':''}" onclick="toggleLead('${o}')">${o}</button>`).join('')}
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">Describe your sales process</label>
          <textarea id="f-process" placeholder="e.g. Cold call → book a demo → send proposal → follow up x3 → close&#10;or: Inbound lead → discovery call → 2-week trial → check-in call → convert" oninput="answers.process=this.value;updateBtn()">${answers.process}</textarea>
          <div class="form-hint">Walk us through the steps from first contact to signed deal. This shapes your pipeline stages.</div>
        </div>

        <div class="form-field">
          <label class="form-label">What information do you track about your leads?</label>
          <textarea id="f-tracking" placeholder="e.g. company size, industry, annual revenue, decision maker name, budget, number of locations&#10;or: policy type, coverage amount, renewal date, referred by" oninput="answers.tracking=this.value;updateBtn()">${answers.tracking}</textarea>
          <div class="form-hint">List the data points you care about. These become your custom fields in Close.</div>
        </div>

        <div class="form-field">
          <label class="form-label">What's your biggest sales challenge right now?</label>
          <textarea id="f-challenge" placeholder="e.g. Leads go cold after the demo and we don't follow up consistently&#10;or: No visibility into where deals are stalling&#10;or: New reps don't know what to do next" oninput="answers.challenge=this.value;updateBtn()">${answers.challenge}</textarea>
          <div class="form-hint">This helps us recommend the right workflows and smart views to solve your actual pain.</div>
        </div>

        <div class="form-field">
          <label class="form-label">Anything else we should know? <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted)">(optional)</span></label>
          <textarea id="f-extra" placeholder="Any context about your team, your customers, your current tools, or what you've tried before..." oninput="answers.extra=this.value" style="min-height:56px">${answers.extra}</textarea>
        </div>

      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="generate-btn" onclick="generate()" ${ready?'':'disabled'}>
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Generate my Close setup
      </button>
    </div>`;
}

function toggleLead(val){
  if(!answers.leads)answers.leads=[];
  const idx=answers.leads.indexOf(val);
  if(idx>=0)answers.leads.splice(idx,1);
  else answers.leads.push(val);
  render();
}

function updateBtn(){
  const btn=document.getElementById('generate-btn');
  if(btn)btn.disabled=!canGenerate();
}

async function generate(){
  loading=true;render();
  const prompt=`You are a Close CRM expert. Based on this business information, generate a complete personalized Close CRM setup.

Business info:
- Company website: ${answers.url}
- Team size: ${answers.team}
- Lead sources: ${(answers.leads||[]).join(', ')||'Not specified'}
- Sales process: ${answers.process}
- Information they track on leads: ${answers.tracking}
- Biggest sales challenge: ${answers.challenge}
- Additional context: ${answers.extra||'None'}

Return ONLY a raw JSON object. No markdown, no backticks, no explanation. Be very specific to their actual business — use their industry's language, their actual field names, their actual process steps.

{
  "business_summary": "One sentence describing their business and who they sell to",
  "lead_statuses": [
    {"name": "New Lead", "color": "gray", "why": "One sentence rationale specific to their business"},
    {"name": "Contacted", "color": "blue", "why": "One sentence"},
    {"name": "Qualified", "color": "green", "why": "One sentence"},
    {"name": "Demo Scheduled", "color": "yellow", "why": "One sentence"},
    {"name": "Proposal Sent", "color": "orange", "why": "One sentence"},
    {"name": "Won", "color": "green", "why": "One sentence"},
    {"name": "Lost", "color": "red", "why": "One sentence"},
    {"name": "Not Interested", "color": "gray", "why": "One sentence"}
  ],
  "pipeline_name": "Name based on their business",
  "pipeline_stages": [
    {"name": "Stage name from their actual process", "why": "One sentence rationale"}
  ],
  "custom_fields": [
    {"name": "Field name from their tracking list", "type": "Dropdown", "options": ["option1", "option2"], "why": "One sentence"},
    {"name": "Field name", "type": "Text", "why": "One sentence"},
    {"name": "Field name", "type": "Date", "why": "One sentence"},
    {"name": "Field name", "type": "Number", "why": "One sentence"}
  ],
  "smart_views": [
    {"name": "View name", "filters": "Specific filter conditions", "why": "One sentence tied to their challenge"},
    {"name": "View name", "filters": "Specific filter conditions", "why": "One sentence"},
    {"name": "View name", "filters": "Specific filter conditions", "why": "One sentence"},
    {"name": "View name", "filters": "Specific filter conditions", "why": "One sentence"}
  ],
  "workflows": [
    {
      "name": "Workflow name tied to their challenge",
      "why": "One sentence rationale",
      "prompt": "Detailed prompt ready to paste into Close's AI workflow builder. Be specific about triggers, timing, and actions."
    },
    {
      "name": "Second workflow",
      "why": "One sentence",
      "prompt": "Detailed workflow prompt"
    },
    {
      "name": "Third workflow",
      "why": "One sentence",
      "prompt": "Detailed workflow prompt"
    }
  ],
  "quick_wins": [
    "First thing to set up and exactly why it will help their specific challenge",
    "Second quick win",
    "Third quick win"
  ]
}

Pipeline stages must directly reflect the steps they described in their sales process. Custom fields must come from the tracking info they provided — use their exact field names where possible. Smart views and workflows must directly address their stated challenge.`;

  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    const data=await res.json();
    const clean=(data.result||'').replace(/```json|```/g,'').trim();
    result=JSON.parse(clean);
    loading=false;render();
  }catch(e){
    loading=false;
    document.getElementById('app').innerHTML=`<div class="error-wrap">Something went wrong. Please try again.<br><br><button class="btn btn-primary" onclick="result=null;loading=false;render()">Try again</button></div>`;
  }
}

function getStatusColor(n){return STATUS_COLORS.find(c=>c.name===n)||STATUS_COLORS[0];}

function renderResult(app){
  const r=result;
  let html=`
    <div class="page-header">
      <div class="page-title">Your Close setup</div>
      <div class="page-sub">${r.business_summary} Here's exactly how to configure Close for your team — with mockups and step-by-step instructions.</div>
    </div>`;

  // Quick wins
  html+=`<div class="result-section">
    <div class="section-head">
      <div class="section-icon" style="background:#e8f0fe;color:#1f6feb"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <div><div class="section-title">Start here — quick wins</div><div class="section-sub">Do these first before anything else</div></div>
    </div>
    <div class="section-body">`;
  r.quick_wins.forEach((w,i)=>{
    html+=`<div class="quick-win"><div class="qw-num">${i+1}</div><div class="qw-text">${w}</div></div>`;
  });
  html+=`</div></div>`;

  // Lead statuses
  html+=`<div class="result-section">
    <div class="section-head">
      <div class="section-icon" style="background:#e6f4ec;color:#27a85e"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div><div class="section-title">Lead statuses</div><div class="section-sub">Track where every lead stands in your relationship</div></div>
    </div>
    <div class="section-body">
      <div class="mockup-wrap">
        <div class="mockup-label">Preview — Settings → Statuses & Pipelines</div>
        <div class="status-pills-row">`;
  r.lead_statuses.forEach(s=>{
    const c=getStatusColor(s.color);
    html+=`<div class="status-pill" style="background:${c.bg};border-color:${c.border}"><div class="dot" style="background:${c.dot}"></div>${s.name}</div>`;
  });
  html+=`</div></div>`;
  r.lead_statuses.forEach(s=>{
    const c=getStatusColor(s.color);
    html+=`<div class="rec-item">
      <div class="rec-name"><span class="status-pill" style="background:${c.bg};border-color:${c.border};display:inline-flex;margin-bottom:4px"><div class="dot" style="background:${c.dot};width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0;margin-top:2px"></div>${s.name}</span></div>
      <div class="rec-why">${s.why}</div>
    </div>`;
  });
  html+=`<div class="instructions">
    <div class="instructions-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>How to set up in Close</div>
    <ol class="instruction-steps">
      <li class="instruction-step"><div class="step-num">1</div><div>Go to <span class="step-path">Settings → Statuses & Pipelines</span></div></li>
      <li class="instruction-step"><div class="step-num">2</div><div>Under <strong>Lead Statuses</strong>, click the color circle, type the status name, click <strong>Add</strong></div></li>
      <li class="instruction-step"><div class="step-num">3</div><div>Repeat for each status. Drag to reorder to match your typical progression.</div></li>
    </ol>
  </div></div></div>`;

  // Pipeline
  html+=`<div class="result-section">
    <div class="section-head">
      <div class="section-icon" style="background:#fef3c7;color:#92400e"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div>
      <div><div class="section-title">Opportunity pipeline — ${r.pipeline_name}</div><div class="section-sub">Your deal stages from first contact to close</div></div>
    </div>
    <div class="section-body">
      <div class="mockup-wrap">
        <div class="mockup-label">Preview — Opportunities → Pipeline view (Kanban)</div>
        <div class="kanban-wrap">`;
  r.pipeline_stages.forEach((s,i)=>{
    const c=PIPELINE_COLORS[i%PIPELINE_COLORS.length];
    html+=`<div class="kanban-col">
      <div class="kanban-header" style="background:${c.bg};color:${c.color}">${s.name}</div>
      <div class="kanban-card">
        <div class="kanban-card-name">Example Co.</div>
        <div class="kanban-card-val">$5,000</div>
        <div class="kanban-card-avatar">TS</div>
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  r.pipeline_stages.forEach(s=>{
    html+=`<div class="rec-item"><div class="rec-name">${s.name}</div><div class="rec-why">${s.why}</div></div>`;
  });
  html+=`<div class="instructions">
    <div class="instructions-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>How to set up in Close</div>
    <ol class="instruction-steps">
      <li class="instruction-step"><div class="step-num">1</div><div>Go to <span class="step-path">Settings → Statuses & Pipelines</span></div></li>
      <li class="instruction-step"><div class="step-num">2</div><div>Scroll to <strong>Opportunity Pipelines</strong> → click <strong>Add Pipeline</strong> → name it "${r.pipeline_name}"</div></li>
      <li class="instruction-step"><div class="step-num">3</div><div>Add each stage. Set type to <strong>Active</strong> for working stages, <strong>Won</strong> for closed-won, <strong>Lost</strong> for closed-lost.</div></li>
      <li class="instruction-step"><div class="step-num">4</div><div>View your pipeline at <span class="step-path">Opportunities → Pipeline</span> in the left nav.</div></li>
    </ol>
  </div></div></div>`;

  // Custom fields
  html+=`<div class="result-section">
    <div class="section-head">
      <div class="section-icon" style="background:#ede9fe;color:#7c3aed"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
      <div><div class="section-title">Custom fields</div><div class="section-sub">Capture the data points that matter to your business</div></div>
    </div>
    <div class="section-body">
      <div class="mockup-wrap">
        <div class="mockup-label">Preview — how fields appear on a lead record</div>
        <div class="lead-record-mockup">
          <div class="lead-record-main">
            <div class="lead-record-name">Example Company Inc.</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">John Smith · john@example.com</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">+1 (555) 000-0000</div>
          </div>
          <div class="lead-record-side">
            <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Your custom fields</div>`;
  r.custom_fields.forEach(f=>{
    html+=`<div class="field-row"><div class="field-row-label">${f.name}</div><div class="field-row-empty">Not set</div></div>`;
  });
  html+=`</div></div></div>`;
  r.custom_fields.forEach(f=>{
    const typeClass=f.type==='Dropdown'?'tag-dropdown':f.type==='Number'?'tag-number':f.type==='Date'?'tag-date':f.type==='Checkbox'?'tag-checkbox':'tag-text';
    html+=`<div class="rec-item">
      <div class="rec-name">${f.name} <span class="tag ${typeClass}">${f.type}</span>${f.options?` <span style="font-size:12px;color:var(--muted)">${f.options.join(', ')}</span>`:''}</div>
      <div class="rec-why">${f.why}</div>
    </div>`;
  });
  html+=`<div class="instructions">
    <div class="instructions-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>How to set up in Close</div>
    <ol class="instruction-steps">
      <li class="instruction-step"><div class="step-num">1</div><div>Go to <span class="step-path">Settings → Custom Fields</span></div></li>
      <li class="instruction-step"><div class="step-num">2</div><div>Click <strong>+ New Custom Field</strong> → choose <strong>Lead</strong> as the object type</div></li>
      <li class="instruction-step"><div class="step-num">3</div><div>Enter the field name, choose the type, add any dropdown options, click <strong>Save</strong></div></li>
      <li class="instruction-step"><div class="step-num">4</div><div>Fields appear on every lead record under the <strong>Fields</strong> section on the right side.</div></li>
    </ol>
  </div></div></div>`;

  // Smart views
  html+=`<div class="result-section">
    <div class="section-head">
      <div class="section-icon" style="background:#e0f2fe;color:#0891b2"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <div><div class="section-title">Smart views</div><div class="section-sub">Saved lead lists you'll use every single day</div></div>
    </div>
    <div class="section-body">
      <div class="mockup-wrap">
        <div class="mockup-label">Preview — Smart Views sidebar in Close</div>
        <div class="smartview-wrap">`;
  r.smart_views.forEach((v,i)=>{
    html+=`<div class="smartview-item ${i===0?'active':''}">
      <svg class="smartview-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      ${v.name}
    </div>`;
  });
  html+=`</div>
        <div class="smartview-filter-wrap">
          <div style="font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:500">Example — filters for "${r.smart_views[0].name}"</div>
          ${r.smart_views[0].filters.split('+').map(f=>`<span class="filter-chip">${f.trim()}</span>`).join('')}
        </div>
      </div>`;
  r.smart_views.forEach(v=>{
    html+=`<div class="rec-item">
      <div class="rec-name">${v.name}</div>
      <div class="rec-why">${v.why}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px"><strong>Filters:</strong> ${v.filters}</div>
    </div>`;
  });
  html+=`<div class="instructions">
    <div class="instructions-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>How to set up in Close</div>
    <ol class="instruction-steps">
      <li class="instruction-step"><div class="step-num">1</div><div>Click <strong>Leads</strong> in the left nav</div></li>
      <li class="instruction-step"><div class="step-num">2</div><div>Click <strong>Filters</strong> at the top → add the filter conditions listed for each view</div></li>
      <li class="instruction-step"><div class="step-num">3</div><div>Click <strong>Save</strong> in the top right → name the view → it appears in your Smart Views sidebar</div></li>
      <li class="instruction-step"><div class="step-num">4</div><div>Pin your most-used views to the top of the sidebar for quick access.</div></li>
    </ol>
  </div></div></div>`;

  // Workflows
  html+=`<div class="result-section">
    <div class="section-head">
      <div class="section-icon" style="background:#fce7f3;color:#9d174d"><svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg></div>
      <div><div class="section-title">Workflows</div><div class="section-sub">Automate your follow-up so nothing falls through the cracks</div></div>
    </div>
    <div class="section-body">`;
  r.workflows.forEach(w=>{
    html+=`<div class="rec-item">
      <div class="rec-name">${w.name}</div>
      <div class="rec-why">${w.why}</div>
      <div class="mockup-wrap" style="margin-top:10px">
        <div class="mockup-label">Paste into Close → Workflows → New Workflow → describe your workflow</div>
        <div class="workflow-prompt-box">${w.prompt}</div>
      </div>
    </div>`;
  });
  html+=`<div class="instructions">
    <div class="instructions-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>How to set up in Close</div>
    <ol class="instruction-steps">
      <li class="instruction-step"><div class="step-num">1</div><div>Click <strong>Workflows</strong> in the left nav → click <strong>+ New Workflow</strong></div></li>
      <li class="instruction-step"><div class="step-num">2</div><div>In the text box at the bottom of the modal, paste the prompt above</div></li>
      <li class="instruction-step"><div class="step-num">3</div><div>Close's AI builds the workflow. Review the trigger and steps, then click <strong>Activate</strong>.</div></li>
    </ol>
  </div></div></div>`;

  // CTA
  html+=`<div class="cta-row">
    <button class="btn" onclick="result=null;answers={url:'',team:'',leads:[],process:'',tracking:'',challenge:'',extra:''};render()">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Start over
    </button>
    <button class="btn btn-primary" onclick="window.open('https://app.close.com','_blank')">
      Open Close and set this up →
    </button>
  </div>`;

  app.innerHTML=html;
  window.scrollTo(0,0);
}

render();
</script>
</body>
</html>
